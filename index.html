<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.37/moment-timezone-with-data-1970-2030.min.js"></script>

    <title>World Clock Project</title>
</head>
<body>
    <div class="container">
        <h1>World Clock 🌍</h1>

        <select id="city">
            <option value="">Select a City...</option>
            <option value="current">My current location</option>
            <option value="Europe/London">London</option>
            <option value="America/New_York">New York</option>
            <option value="Pacific/Aukland">Auckland</option>
            <option value="Asia/Tokoyo">Tokoyo</option>
            <option value="America/Sao_Paulo">Sao Paulo</option>
            <option value="Africa/Johannesburg">Johannesburg</option>
        </select>

        <div id="cities">
            <div class="city" id="los-angeles">
                <div class="city-info">
                    <h2>Los Angeles</h2>
                    <div class="date"></div>
                </div>
                <div class="time"></div>
            </div>
        
            <div class="city" id="paris">
                <div class="city-info">
                    <h2>Paris</h2>
                    <div class="date"></div>
                </div>
                <div class="time"></div>
            </div>

            <div class="city" id="sydney">
                <div class="city-info">
                    <h2>Sydney</h2>
                    <div class="date"></div>
                </div>
                <div class="time"></div>
            </div>
        </div>
    </div>
     <footer>
        This project was coded by Boitumelo Rakgole and is 
        <a href="https://github.com/BoitumeloRak/world-clock-project" target="_blank">
            open sourced on GitHub </a
        >
    </footer>
    <script src="src/index.js"></script>

</body>
</html>
